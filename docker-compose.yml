services:
  node0:
    build:
      context: .
      dockerfile: docker/Dockerfile
    hostname: node0
    environment:
      NODE_ID: "0"
      NODE_COUNT: "4"
      BASE_PORT: "8000"
      PEERS: "node0:8000,node1:8001,node2:8002,node3:8003"
    ports:
      - "8000:8000"
    volumes:
      - shared_data:/app/shared
    networks:
      - cluster
    healthcheck:
      test: ["CMD", "python", "-c", "import os; os.kill(1, 0)"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  node1:
    build:
      context: .
      dockerfile: docker/Dockerfile
    hostname: node1
    environment:
      NODE_ID: "1"
      NODE_COUNT: "4"
      BASE_PORT: "8000"
      PEERS: "node0:8000,node1:8001,node2:8002,node3:8003"
    ports:
      - "8001:8001"
    volumes:
      - shared_data:/app/shared
    networks:
      - cluster
    depends_on:
      node0:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import os; os.kill(1, 0)"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  node2:
    build:
      context: .
      dockerfile: docker/Dockerfile
    hostname: node2
    environment:
      NODE_ID: "2"
      NODE_COUNT: "4"
      BASE_PORT: "8000"
      PEERS: "node0:8000,node1:8001,node2:8002,node3:8003"
    ports:
      - "8002:8002"
    volumes:
      - shared_data:/app/shared
    networks:
      - cluster
    depends_on:
      node1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import os; os.kill(1, 0)"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  node3:
    build:
      context: .
      dockerfile: docker/Dockerfile
    hostname: node3
    environment:
      NODE_ID: "3"
      NODE_COUNT: "4"
      BASE_PORT: "8000"
      PEERS: "node0:8000,node1:8001,node2:8002,node3:8003"
    ports:
      - "8003:8003"
    volumes:
      - shared_data:/app/shared
    networks:
      - cluster
    depends_on:
      node2:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import os; os.kill(1, 0)"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

networks:
  cluster:
    driver: bridge

volumes:
  shared_data:
