services:
  node0:
    build:
      context: .
      dockerfile: docker/Dockerfile
    hostname: node0
    environment:
      NODE_ID: "0"
      NODE_COUNT: "4"
      BASE_PORT: "5000"
      PEERS: "node0:5000,node1:5001,node2:5002,node3:5003"
    ports:
      - "5000:5000"
    volumes:
      - shared_data:/app/shared
    networks:
      - cluster
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python src/main.py' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  node1:
    build:
      context: .
      dockerfile: docker/Dockerfile
    hostname: node1
    environment:
      NODE_ID: "1"
      NODE_COUNT: "4"
      BASE_PORT: "5000"
      PEERS: "node0:5000,node1:5001,node2:5002,node3:5003"
    ports:
      - "5001:5001"
    volumes:
      - shared_data:/app/shared
    networks:
      - cluster
    depends_on:
      node0:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python src/main.py' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  node2:
    build:
      context: .
      dockerfile: docker/Dockerfile
    hostname: node2
    environment:
      NODE_ID: "2"
      NODE_COUNT: "4"
      BASE_PORT: "5000"
      PEERS: "node0:5000,node1:5001,node2:5002,node3:5003"
    ports:
      - "5002:5002"
    volumes:
      - shared_data:/app/shared
    networks:
      - cluster
    depends_on:
      node1:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python src/main.py' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  node3:
    build:
      context: .
      dockerfile: docker/Dockerfile
    hostname: node3
    environment:
      NODE_ID: "3"
      NODE_COUNT: "4"
      BASE_PORT: "5000"
      PEERS: "node0:5000,node1:5001,node2:5002,node3:5003"
    ports:
      - "5003:5003"
    volumes:
      - shared_data:/app/shared
    networks:
      - cluster
    depends_on:
      node2:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python src/main.py' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

networks:
  cluster:
    driver: bridge

volumes:
  shared_data:
